name: Enrich Artist Aliases

on:
  workflow_dispatch:
    inputs:
      use_google:
        description: "Use Google translation via deep-translator"
        required: false
        default: "true"

concurrency:
  group: enrich-artist-aliases-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest

    env:
      USE_GOOGLE: ${{ github.event.inputs.use_google || 'true' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install alias dependencies
        run: pip install -r requirements-aliases.txt

      - name: Enrich artist aliases
        run: |
          if [ "$USE_GOOGLE" = "true" ]; then
            python scripts/enrich_artist_aliases.py --use-google
          else
            python scripts/enrich_artist_aliases.py
          fi

      - name: Commit updated artist_sources.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add artist_sources.json

          if git diff --cached --quiet; then
            echo "No alias changes to commit"
            exit 0
          fi

          git commit -m "Enrich artist aliases"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push failed, retrying..."
            sleep 5
          done

          echo "Push failed after retries"
          exit 1
