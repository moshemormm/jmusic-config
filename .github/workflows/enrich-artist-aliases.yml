name: Enrich Artist Aliases

on:
  workflow_dispatch:
    inputs:
      use_google:
        description: "Use Google translation via deep-translator"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest

    env:
      USE_GOOGLE: ${{ github.event.inputs.use_google || 'true' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install alias dependencies
        run: pip install -r requirements-aliases.txt

      - name: Enrich artist aliases
        run: |
          if [ "$USE_GOOGLE" = "true" ]; then
            python scripts/enrich_artist_aliases.py --use-google
          else
            python scripts/enrich_artist_aliases.py
          fi

      - name: Commit updated artist_sources.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add artist_sources.json
          git diff --cached --quiet || git commit -m "Enrich artist aliases"
          git push
